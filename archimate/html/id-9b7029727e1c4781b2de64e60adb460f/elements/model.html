										dataElements.push({id:"id-b3fa95bd1cfd49578ca6d39c501c894a", type:"Principle", specialization:decodeURL(""), name:decodeURL("European+Library+of+Architecture+Principles"), documentation:decodeURL("Definition%3A+European+Library+of+Architecture+Principles+%28ELAP%29+ABB+is+a+set+of+principles+that+aim+to+support+interoperability+and+standardization+in+eGoverment+across+the+EU.%0A%0ASource%3A+ELAP%0A%0ASource+reference%3A+https%3A%2F%2Fjoinup.ec.europa.eu%2Fcollection%2Fcommon-assessment-method-standards-and-specifications-camss%2Fsolution%2Felap%0A%0AAdditional+information%3A+The+European+Library+of+Architecture+Principles+%28ELAP%29+ABB+is+a+set+of+principles+intended+to+direct+government+organizations+in+initiating+changes+and+implementing+IT+projects.+Particularly+when+designing+new+or+modified+services%2C+it+is+necessary+to+make+visible+how+the+principles+are+implemented+and+which+considerations+are+made+in+this+regard.+The+apply-or-explain+principle+applies+here%2C+whereby+deviations+are+permitted+provided+that+they+are+substantiated+and+recorded+with+good+arguments+so+that+they+can+be+revisited+at+a+later+stage.+This+prevents+important+matters+from+being+overlooked.%0A%0AExample%3A+The+following+implementation+is+an+example+of+how+this+specific+Architecture+Building+Block+%28ABB%29+can+be+instantiated+as+a+Solution+Building+Block+%28SBB%29%3A+ELAP+transparency+principle+in+the+EIF+context+refers+to%3A+Enabling+visibility+inside+the+administrative+environment+of+a+public+administration.+This+is+about+allowing+other+public+administrations%2C+citizens%2C+and+businesses+to+view+and+understand+administrative+rules%2C+processes%2C+11+data%2C+services%2C+and+decision-making.+Ensuring+availability+of+interfaces+with+internal+information+systems.+Public+administrations+operate+a+large+number+of+what+are+often+heterogeneous+and+disparate+information+systems+in+support+of+their+internal+processes.+Interoperability+depends+on+ensuring+the+availability+of+interfaces+to+these+systems+and+the+data+they+handle.+In+turn%2C+interoperability+facilitates+reuse+of+systems+and+data%2C+and+enables+these+to+be+integrated+into+larger+systems.+Securing+the+right+to+the+protection+of+personal+data%2C+by+respecting+the+applicable+legal+framework+for+the+large+volumes+of+personal+data+of+citizens%2C+held+and+managed+by+Public+administrations.+https%3A%2F%2Fjoinup.ec.europa.eu%2Fcollection%2Fcommon-assessment-method-standards-and-specifications-camss%2Fsolution%2Felap%2Fdistribution%2Felap-catalogue-v100xlsx%0A%0AInteroperability+Dimension%3A+Governance+IoP%0A%0ALOST+view%3A+EIRA+Ontology+view%0A%0AInteroperability+Saliency%3A+The+European+Library+of+Architecture+Principles+%28ELAP%29+ABB+is+salient+for+governance+interoperability+due+to+it+establishes+the+principles+and+framework+to+ensure+interoperability+at+the+European+level.+Also%2C+the+European+Library+of+Architecture+Principles+ABB+is+salient+for+organizational+interoperability+due+to+it+establishes+requirements+and+business+processes+to+enable+interoperability+between+public+services.%0A%0AIdentifier%3A+http%3A%2F%2Fdata.europa.eu%2Fdr8%2FEuropeanLibraryOfArchitecturePrinciplesPrinciple%0A%0AABB+name%3A+eira%3AEuropeanLibraryOfArchitecturePrinciplesPrinciple%0A%0AEIRA+concept%3A+eira%3AArchitectureBuildingBlock%0A%0ALast+modification%3A+2024-01-28%0A%0AIdentifier%3A+http%3A%2F%2Fdata.europa.eu%2Fdr8%2FEuropeanLibraryOfArchitecturePrinciplesPrinciple%0A%0AInteroperability+Layer%3A+N%2FA%0A%0A")});
